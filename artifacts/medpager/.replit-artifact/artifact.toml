kind = "web"
previewPath = "/"
title = "MedPager"
version = "1.0.0"
id = "artifacts/medpager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18790

[services.development]
run = "pnpm --filter @workspace/medpager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medpager", "run", "build" ]
publicDir = "artifacts/medpager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18790"
BASE_PATH = "/"
